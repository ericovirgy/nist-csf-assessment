# ============================================================
# Avaliação NIST Cybersecurity Framework 2.0 — Input Completo
# ============================================================
# Structure verified: 6 functions, 22 categories, 106 subcategories per official NIST CSF 2.0
# (GV=31, ID=21, PR=22, DE=11, RS=13, RC=8). Wording from NIST CSF 2.0 Reference Tool Export
# (XLSX, csrc.nist.gov). Subcategory numbering gaps (ID.AM-06, PR.DS-03..09, DE.CM-04/05/07/08,
# DE.AE-01/05, RS.AN-01/02/04/05, RS.CO-01, RC.CO-01/02) are official CSF 1.1→2.0 withdrawals.
#
# Os identificadores com números não contíguos (e.g. ID.AM-07 a seguir a ID.AM-05,
# PR.DS-10 a seguir a PR.DS-02) refletem a numeração oficial do CSF 2.0, que manteve
# rastreabilidade com o CSF 1.1 removendo subcategorias descontinuadas. Os identificadores
# marcados "# VERIFICAR" devem ser confirmados na NIST CSF 2.0 Reference Tool JSON.
#
# Organização: TechSample Lda. (empresa tecnologia, ~150 colaboradores — dados fictícios)
# Avaliador:   João Silva (CISO)
# Data:        2026-07-06
# Âmbito:      Infraestrutura de TI corporativa e serviços cloud
#
# Escala de maturidade:
#   0 = Não Implementado   (sem práticas)
#   1 = Inicial            (práticas ad hoc)
#   2 = Gerenciado         (práticas documentadas)
#   3 = Consistente        (práticas padronizadas e monitorizadas)
#   4 = Otimizado          (melhoria contínua, benchmarking externo)
# ============================================================

organization: "TechSample Lda."
assessor: "João Silva (CISO)"
date: "2026-07-06"
scope: "Infraestrutura de TI corporativa e serviços cloud"

scores:

  # ===========================================================
  # GOVERN (GV) — 6 categorias, 31 subcategorias
  # "Establish and monitor the organization's cybersecurity
  #  risk management strategy, expectations, and policy"
  # ===========================================================

  # GV.OC — Organizational Context (5 subcategorias: GV.OC-01 a GV.OC-05)
  # Outcome: The organization's circumstances are understood to inform the management
  #          of cybersecurity risk.
  GV.OC-01: 3  # "The organizational mission is understood and informs cybersecurity risk management"
               # [PT] Missão organizacional documentada e conhecida pela liderança
  GV.OC-02: 2  # "Internal and external stakeholder needs, expectations, and requirements regarding cybersecurity — including legal, regulatory, and contractual requirements — are understood"
               # [PT] Partes interessadas parcialmente mapeadas; requisitos legais identificados
  GV.OC-03: 3  # "Legal, regulatory, and contractual requirements regarding cybersecurity — including privacy and civil liberties obligations — are understood and managed"
               # [PT] Requisitos RGPD e NIS2 identificados; monitorização em curso
  GV.OC-04: 2  # "Critical objectives, capabilities, and services that external stakeholders depend on or expect from the organization are understood and communicated"
               # [PT] Objetivos críticos identificados parcialmente; falta documentação formal
  GV.OC-05: 2  # "Outcomes, capabilities, and services that the organization depends on are understood and communicated"
               # [PT] Dependências externas (cloud, SaaS) parcialmente mapeadas

  # GV.RM — Risk Management Strategy (7 subcategorias: GV.RM-01 a GV.RM-07)
  # Outcome: The organization's priorities, constraints, risk tolerance and appetite
  #          statements, and assumptions are established, communicated, and used to
  #          support operational risk decisions.
  GV.RM-01: 2  # "Risk management objectives are established and agreed to by organizational stakeholders"
               # [PT] Objetivos de gestão de risco definidos mas pendentes de aprovação formal
  GV.RM-02: 1  # "Risk appetite and risk tolerance statements are established, communicated, and maintained"
               # [PT] Apetite pelo risco não formalizado; decisões tomadas caso a caso
  GV.RM-03: 1  # "Cybersecurity risk management activities and outcomes are included in enterprise risk management (ERM) processes"
               # [PT] Risco cibernético não integrado no ERM corporativo
  GV.RM-04: 2  # "Strategic direction that describes appropriate risk response options is established and communicated"
               # [PT] Direção estratégica parcialmente definida; falta comunicação transversal
  GV.RM-05: 2  # "Lines of communication across the organization are established for cybersecurity risks, including risks from suppliers and other third parties"
               # [PT] Canais de comunicação estabelecidos; cadeia de fornecimento parcialmente coberta
  GV.RM-06: 1  # "A standardized method for calculating, documenting, categorizing, and prioritizing cybersecurity risks is established and communicated"
               # [PT] Metodologia de cálculo de risco incipiente; sem taxonomia padronizada
  GV.RM-07: 1  # "Strategic opportunities (i.e., positive risks) are characterized and are included in organizational cybersecurity risk discussions"
               # [PT] Oportunidades estratégicas ligadas à cibersegurança não consideradas

  # GV.RR — Roles, Responsibilities, and Authorities (4 subcategorias: GV.RR-01 a GV.RR-04)
  # Outcome: Cybersecurity roles, responsibilities, and authorities to foster
  #          accountability, performance assessment, and continuous improvement are
  #          established and communicated.
  GV.RR-01: 3  # "Organizational leadership is responsible and accountable for cybersecurity risk and fosters a culture that is risk-aware, ethical, and continually improving"
               # [PT] Liderança ciente das responsabilidades; cultura de risco em desenvolvimento
  GV.RR-02: 2  # "Roles, responsibilities, and authorities related to cybersecurity risk management are established, communicated, understood, and enforced"
               # [PT] Papéis definidos no organograma mas responsabilidades não totalmente atribuídas
  GV.RR-03: 2  # "Adequate resources are allocated commensurate with the cybersecurity risk strategy, roles, responsibilities, and policies"
               # [PT] Recursos adequados para a maioria das áreas; lacunas em formação especializada
  GV.RR-04: 2  # "Cybersecurity is included in human resources practices"
               # [PT] Cibersegurança incluída parcialmente em RH: onboarding e offboarding cobertos

  # GV.PO — Policy (2 subcategorias: GV.PO-01 a GV.PO-02)
  # Outcome: Organizational cybersecurity policy is established, communicated, and enforced.
  GV.PO-01: 2  # "Policy for managing cybersecurity risks is established based on organizational context, cybersecurity strategy, and priorities and is communicated and enforced"
               # [PT] Política de segurança existente (v2021); parcialmente desatualizada face ao CSF 2.0
  GV.PO-02: 1  # "Policy for managing cybersecurity risks is reviewed, updated, communicated, and enforced to reflect changes in requirements, threats, technology, and organizational mission"
               # [PT] Revisão de políticas irregular; sem ciclo formal de atualização

  # GV.OV — Oversight (3 subcategorias: GV.OV-01 a GV.OV-03)
  # Outcome: Results of organization-wide cybersecurity risk management activities and
  #          performance are used to inform, improve, and adjust the risk management strategy.
  GV.OV-01: 2  # "Cybersecurity risk management strategy outcomes are reviewed to inform and adjust strategy and direction"
               # [PT] Revisão periódica semestral dos resultados; sem feedback loop formal
  GV.OV-02: 1  # "The cybersecurity risk management strategy is reviewed and adjusted to reflect changes in the organization's mission, stakeholder requirements, threats, and technology landscape"
               # [PT] Estratégia de risco raramente revisada; não acompanha mudanças de ameaças
  GV.OV-03: 1  # "Organizational cybersecurity risk management performance is evaluated and reviewed for adjustments needed"
               # [PT] Desempenho de GRC não medido formalmente; sem KPIs de cibersegurança

  # GV.SC — Cybersecurity Supply Chain Risk Management (10 subcategorias: GV.SC-01 a GV.SC-10)
  # Outcome: Cyber supply chain risk management processes are identified, established,
  #          managed, monitored, and improved by organizational stakeholders.
  GV.SC-01: 1  # "A cybersecurity supply chain risk management program, strategy, objectives, policies, and processes are established and agreed to by organizational stakeholders"
               # [PT] Programa de risco na cadeia de fornecimento incipiente; sem estratégia formal
  GV.SC-02: 1  # "Cybersecurity requirements are established for suppliers and other third-party partners to implement and monitor throughout the supply chain"
               # [PT] Requisitos de segurança para fornecedores não formalizados; sem cláusulas contratuais
  GV.SC-03: 1  # "Suppliers and other third-party partners are prioritized by criticality"
               # [PT] Fornecedores não priorizados por criticidade; lista não mantida
  GV.SC-04: 0  # "Suppliers and other third-party partners are assessed routinely to confirm that they are meeting their contractual obligations"
               # [PT] Avaliações formais de fornecedores não realizadas
  GV.SC-05: 0  # "Requirements to address cybersecurity risks in supply chains are established, prioritized, and integrated into contracts and other types of agreements with suppliers and third-party partners"
               # [PT] Requisitos de segurança da cadeia não integrados em contratos
  GV.SC-06: 1  # "Planning and due diligence are performed to reduce risks before entering into formal supplier or other third-party partner relationships"
               # [PT] Due diligence básica antes de contratos; sem metodologia formal
  GV.SC-07: 1  # "The risks posed by a supplier, their products and services, and other third parties are understood, recorded, prioritized, assessed, responded to, and monitored over the course of the relationship"
               # [PT] Riscos de fornecedores parcialmente identificados; sem registo centralizado
  GV.SC-08: 0  # "Relevant suppliers and other third-party partners are included in incident planning, response, and recovery activities"
               # [PT] Fornecedores excluídos do planeamento e resposta a incidentes
  GV.SC-09: 0  # "Supply chain security practices are integrated into cybersecurity and enterprise risk management programs, and their performance is monitored throughout the technology product and service life cycle"
               # [PT] Práticas de segurança da cadeia não integradas nos programas de risco
  GV.SC-10: 0  # "Cybersecurity supply chain risk management plans include provisions for activities that occur after the conclusion of a partnership or service agreement"
               # [PT] Sem planos para término de relações com fornecedores (offboarding de acesso, dados)

  # ===========================================================
  # IDENTIFY (ID) — 3 categorias, 21 subcategorias
  # "Understand the organization's current cybersecurity risks"
  # ===========================================================

  # ID.AM — Asset Management (7 subcategorias; ID.AM-06 não existe no CSF 2.0)
  # Outcome: Assets (data, hardware, software, systems, facilities, services, people)
  #          that enable the organization to achieve business purposes are identified
  #          and managed consistent with their relative importance to organizational
  #          objectives and the organization's risk strategy.
  ID.AM-01: 3  # "Inventories of hardware managed by the organization are maintained"
               # [PT] Inventário de hardware mantido (CMDB); atualização trimestral
  ID.AM-02: 3  # "Inventories of software, services, and systems managed by the organization are maintained"
               # [PT] Inventário de software mantido; licenças rastreadas
  ID.AM-03: 2  # "Representations of the organization's authorized network communication and internal and external network data flows are maintained"
               # [PT] Diagramas de rede existentes mas parcialmente desatualizados
  ID.AM-04: 1  # "Inventories of services provided by suppliers are maintained"
               # [PT] Inventário de serviços de fornecedores incompleto; SaaS não totalmente mapeado
  ID.AM-05: 2  # "Assets are prioritized based on classification, criticality, resources, and impact on the achievement of mission or business objectives"
               # [PT] Priorização de ativos em progresso; classificação formal pendente
  # ID.AM-06 não existe no CSF 2.0 (descontinuado face ao CSF 1.1)
  ID.AM-07: 1  # "Inventories of data and corresponding metadata for designated data types are maintained"
               # [PT] Inventário de dados incipiente; dados críticos não totalmente catalogados
  ID.AM-08: 2  # "Systems, hardware, software, services, and data are managed throughout their life cycles"
               # [PT] Gestão do ciclo de vida parcialmente implementada; falta processo formal de descomissionamento

  # ID.RA — Risk Assessment (10 subcategorias: ID.RA-01 a ID.RA-10)
  # Outcome: The cybersecurity risk to the organization, assets, and individuals is
  #          understood by the organization.
  ID.RA-01: 2  # "Vulnerabilities in assets are identified, validated, and recorded"
               # [PT] Vulnerabilidades identificadas via scans periódicos; processo não sistemático
  ID.RA-02: 2  # "Cyber threat intelligence is received from information sharing forums and sources"
               # [PT] Inteligência de ameaças recebida via feeds (CERT-PT); análise pontual
  ID.RA-03: 2  # "Internal and external threats to the organization are identified and recorded"
               # [PT] Ameaças internas e externas parcialmente documentadas; sem registo formal
  ID.RA-04: 1  # "Potential impacts and likelihoods of threats exploiting vulnerabilities are identified and recorded"
               # [PT] Impactos estimados informalmente; sem metodologia de probabilidade × impacto
  ID.RA-05: 1  # "Threats, vulnerabilities, likelihoods, and impacts are used to understand inherent risk and inform risk response priorities"
               # [PT] Análise de risco inerente não realizada sistematicamente
  ID.RA-06: 2  # "Risk responses are chosen, prioritized, planned, tracked, and communicated"
               # [PT] Respostas a riscos priorizadas informalmente; rastreamento incipiente
  ID.RA-07: 1  # "Changes and exceptions are managed, assessed for risk impact, prioritized, and approved"
               # [PT] Gestão de alterações básica (CAB informal); avaliação de impacto de risco ausente
  ID.RA-08: 1  # "Processes for receiving, analyzing, and responding to vulnerability disclosures are established"
               # [PT] Processo de divulgação de vulnerabilidades incipiente; sem VDP publicado
  ID.RA-09: 0  # "The authenticity and integrity of hardware and software are assessed prior to acquisition and use"
               # [PT] Autenticidade de hardware/software não avaliada antes da aquisição
  ID.RA-10: 0  # "Critical suppliers are assessed prior to acquisition"
               # [PT] Fornecedores críticos não avaliados antes da aquisição

  # ID.IM — Improvement (4 subcategorias: ID.IM-01 a ID.IM-04)
  # Outcome: Improvements to organizational cybersecurity risk management processes,
  #          procedures and activities are identified across all CSF Functions.
  ID.IM-01: 2  # "Improvements are identified from evaluations"
               # [PT] Melhorias identificadas após auditorias; implementação parcial
  ID.IM-02: 1  # "Improvements are identified from security tests and exercises, including those done in coordination with suppliers and relevant third parties"
               # [PT] Testes de segurança realizados ocasionalmente (pentest anual); sem exercícios tabletop
  ID.IM-03: 1  # "Improvements are identified from execution of operational processes, procedures, and activities"
               # [PT] Melhorias dos processos operacionais não sistematizadas; sem ciclo formal
  ID.IM-04: 1  # "Incident response plans and other cybersecurity plans that affect operations are established, communicated, maintained, and improved"
               # [PT] Lições aprendidas raramente incorporadas nos planos; revisão pós-incidente informal

  # ===========================================================
  # PROTECT (PR) — 5 categorias, 22 subcategorias
  # "Use safeguards to prevent or reduce cybersecurity risks"
  # ===========================================================

  # PR.AA — Identity Management, Authentication, and Access Control (6 subcategorias: PR.AA-01 a PR.AA-06)
  # Outcome: Access to physical and logical assets is limited to authorized users,
  #          services, and hardware and managed commensurate with the assessed risk
  #          of unauthorized access.
  PR.AA-01: 3  # "Identities and credentials for authorized users, services, and hardware are managed by the organization"
               # [PT] Gestão de identidades implementada (AD/Entra ID); revisões trimestrais de contas
  PR.AA-02: 2  # "Identities are proofed and bound to credentials based on the context of interactions"
               # [PT] Verificação de identidade implementada no onboarding; contextual para acessos privilegiados
  PR.AA-03: 3  # "Users, services, and hardware are authenticated"
               # [PT] MFA implementado para acessos remotos e aplicações críticas
  PR.AA-04: 2  # "Identity assertions are protected, conveyed, and verified"
               # [PT] Asserções de identidade (SAML/OIDC) parcialmente protegidas; tokens com expiração
  PR.AA-05: 3  # "Access permissions, entitlements, and authorizations are defined in a policy, managed, enforced, and reviewed, and incorporate the principles of least privilege and separation of duties"
               # [PT] RBAC implementado; princípio do menor privilégio aplicado nas aplicações críticas
  PR.AA-06: 2  # "Physical access to assets is managed, monitored, and enforced commensurate with risk"
               # [PT] Acesso físico controlado (cartão de proximidade); monitorização de registos em progresso

  # PR.AT — Awareness and Training (2 subcategorias: PR.AT-01 a PR.AT-02)
  # Outcome: The organization's personnel are provided with cybersecurity awareness
  #          and training so that they can perform their cybersecurity-related tasks.
  PR.AT-01: 2  # "Personnel are provided with awareness and training so that they can perform their cybersecurity-related tasks"
               # [PT] Formação de sensibilização anual para todos os colaboradores; phishing simulado 2x/ano
  PR.AT-02: 1  # "Individuals in specialized roles are provided with awareness and training so that they possess the knowledge and skills to perform relevant cybersecurity tasks"
               # [PT] Formação especializada pontual (admins, devs); sem plano de certificações

  # PR.DS — Data Security (4 subcategorias; PR.DS salta de -02 para -10 no CSF 2.0)
  # Outcome: Data are managed consistent with the organization's risk strategy to
  #          protect the confidentiality, integrity, and availability of information.
  # NOTA: Os números PR.DS-03 a PR.DS-09 não existem no CSF 2.0 (renumeração face ao CSF 1.1).
  PR.DS-01: 3  # "The confidentiality, integrity, and availability of data-at-rest are protected"
               # [PT] Dados em repouso encriptados (AES-256); política de encriptação documentada
  PR.DS-02: 3  # "The confidentiality, integrity, and availability of data-in-transit are protected"
               # [PT] TLS 1.2+ em todas as comunicações; certificados geridos centralmente
  PR.DS-10: 1  # "The confidentiality, integrity, and availability of data-in-use are protected"
               # [PT] Proteção de dados em uso (DRM, enclaves) não implementada
  PR.DS-11: 3  # "Backups of data are created, protected, maintained, and tested"
               # [PT] Backups diários encriptados; testes de restauro trimestrais; cópia off-site

  # PR.PS — Platform Security (6 subcategorias: PR.PS-01 a PR.PS-06)
  # Outcome: The hardware, software (e.g., firmware, operating systems, applications),
  #          and services of physical and virtual platforms are managed consistent with
  #          the organization's risk strategy to protect their confidentiality,
  #          integrity, and availability.
  PR.PS-01: 3  # "Configuration management practices are established and applied"
               # [PT] Gestão de configurações implementada (CIS Benchmarks como baseline)
  PR.PS-02: 3  # "Software is maintained, replaced, and removed commensurate with risk"
               # [PT] Gestão de patches automatizada (WSUS/SCCM); ciclo mensal de patches críticos
  PR.PS-03: 2  # "Hardware is maintained, replaced, and removed commensurate with risk"
               # [PT] Ciclo de vida de hardware controlado; processo de descomissionamento em falta
  PR.PS-04: 3  # "Log records are generated and made available for continuous monitoring"
               # [PT] Logs gerados e centralizados em SIEM; retenção de 12 meses
  PR.PS-05: 2  # "Installation and execution of unauthorized software are prevented"
               # [PT] Listas de aplicações permitidas parcialmente implementadas; controlo incompleto
  PR.PS-06: 1  # "Secure software development practices are integrated, and their performance is monitored throughout the software development life cycle"
               # [PT] Práticas de desenvolvimento seguro (SSDLC) incipientes; sem SAST/DAST formal

  # PR.IR — Technology Infrastructure Resilience (4 subcategorias: PR.IR-01 a PR.IR-04)
  # Outcome: Security architectures are managed with the organization's risk strategy
  #          to protect asset confidentiality, integrity, and availability, and
  #          organizational resilience.
  PR.IR-01: 3  # "Networks and environments are protected from unauthorized logical access and usage"
               # [PT] Segmentação de redes implementada (DMZ, VLANs); firewall com regras revistas
  PR.IR-02: 2  # "The organization's technology assets are protected from environmental threats"
               # [PT] UPS e controlo de temperatura no datacenter; plano de proteção ambiental básico
  PR.IR-03: 2  # "Mechanisms are implemented to achieve resilience requirements in normal and adverse situations"
               # [PT] Mecanismos de resiliência (failover, redundância) em progresso; não totalmente testados
  PR.IR-04: 2  # "Adequate resource capacity to ensure availability is maintained"
               # [PT] Capacidade adequada na maioria dos casos; monitorização de recursos implementada

  # ===========================================================
  # DETECT (DE) — 2 categorias, 11 subcategorias
  # "Find and analyze possible cybersecurity attacks and compromises"
  # ===========================================================

  # DE.CM — Continuous Monitoring (5 subcategorias; números não contíguos no CSF 2.0)
  # Outcome: Assets are monitored to find anomalies, indicators of compromise, and
  #          other potentially adverse events.
  # NOTA: DE.CM-04, -05, -07, -08 não existem no CSF 2.0.
  DE.CM-01: 3  # "Networks and network services are monitored to find potentially adverse events"
               # [PT] Monitorização de rede implementada (IDS/IPS + SIEM); alertas configurados
  DE.CM-02: 1  # "The physical environment is monitored to find potentially adverse events"
               # [PT] Monitorização física limitada; sem CCTV integrado no SOC
  DE.CM-03: 2  # "Personnel activity and technology usage are monitored to find potentially adverse events"
               # [PT] Monitorização de atividade de utilizadores parcial (DLP básico); UEBA não implementado
  DE.CM-06: 1  # "External service provider activities and services are monitored to find potentially adverse events"
               # [PT] Atividades de fornecedores externos pouco monitorizadas; sem logging de API de terceiros
  DE.CM-09: 2  # "Computing hardware and software, runtime environments, and their data are monitored to find potentially adverse events"
               # [PT] Hardware e software em produção monitorizados via agentes EDR

  # DE.AE — Adverse Event Analysis (6 subcategorias; números não contíguos no CSF 2.0)
  # Outcome: Anomalies, indicators of compromise, and other potentially adverse events
  #          are analyzed to characterize the events and detect cybersecurity incidents.
  # NOTA: DE.AE-01 e DE.AE-05 não existem no CSF 2.0.
  DE.AE-02: 2  # "Potentially adverse events are analyzed to better characterize them and detect attack sequences"
               # [PT] Análise de eventos adversos realizada pela equipa de segurança; processo parcialmente formal
  DE.AE-03: 2  # "Information is correlated from multiple sources"
               # [PT] Correlação de fontes múltiplas via SIEM básico; regras de correlação limitadas
  DE.AE-04: 2  # "The estimated impact and scope of adverse events are understood"
               # [PT] Impacto estimado para eventos conhecidos; metodologia de classificação em desenvolvimento
  DE.AE-06: 2  # "Information on adverse events is provided to authorized staff and tools"
               # [PT] Alertas partilhados com equipa de segurança; integração com ticketing funcional
  DE.AE-07: 1  # "Cyber threat intelligence and other contextual information are integrated into the analysis of adverse events"
               # [PT] Integração de threat intelligence incipiente; feeds manuais, sem automação
  DE.AE-08: 2  # "Incidents are declared when adverse events meet the defined incident criteria"
               # [PT] Critérios de declaração de incidentes definidos; aplicação consistente em progresso

  # ===========================================================
  # RESPOND (RS) — 4 categorias, 13 subcategorias
  # "Take action regarding a detected cybersecurity incident"
  # ===========================================================

  # RS.MA — Incident Management (5 subcategorias: RS.MA-01 a RS.MA-05)
  # Outcome: Responses to detected cybersecurity incidents are managed.
  RS.MA-01: 2  # "The incident response plan is executed in coordination with relevant third parties once an incident is declared"
               # [PT] Plano de resposta existe; raramente testado; coordenação com terceiros não formalizada
  RS.MA-02: 2  # "Incident reports are triaged and validated"
               # [PT] Triagem de relatórios de incidentes funcional; processo documentado
  RS.MA-03: 2  # "Incidents are categorized and prioritized"
               # [PT] Categorização e priorização definidas (P1-P4); aplicação consistente em progresso
  RS.MA-04: 2  # "Incidents are escalated or elevated as needed"
               # [PT] Escalonamento definido; matriz RACI parcialmente implementada
  RS.MA-05: 1  # "The criteria for initiating incident recovery are applied"
               # [PT] Critérios de transição para recuperação não formalizados; decisão ad hoc

  # RS.AN — Incident Analysis (4 subcategorias; números não contíguos no CSF 2.0)
  # Outcome: Investigations are conducted to ensure effective response and support
  #          forensics and recovery activities.
  # NOTA: RS.AN-01, -02, -04, -05 não existem no CSF 2.0.
  RS.AN-03: 2  # "Analysis is performed to establish what has taken place during an incident and the root cause of the incident"
               # [PT] Análise pós-incidente realizada; documentação inconsistente
  RS.AN-06: 2  # "Actions performed during an investigation are recorded, and the records' integrity and provenance are preserved"
               # [PT] Ações durante investigação registadas no ticket; sem cadeia de custódia formal
  RS.AN-07: 1  # "Cause analysis is performed to determine the root cause of incidents"
               # [PT] Análise de causa raiz ocasional; sem método formal (5-Porquês, Fishbone)
  RS.AN-08: 2  # "An incident is characterized"
               # [PT] Caracterização de incidentes definida (tipo, vetor, impacto); aplicação parcial

  # RS.CO — Incident Response Reporting and Communication (2 subcategorias; RS.CO-01 não existe no CSF 2.0)
  # Outcome: Response activities are coordinated with internal and external stakeholders
  #          as required by laws, regulations, or policies.
  # NOTA: RS.CO-01 não existe no CSF 2.0.
  RS.CO-02: 2  # "Internal and external stakeholders are notified of incidents in a timely manner as required by applicable requirements"
               # [PT] Notificação interna de incidentes funcional; notificação CNPD (72h) em revisão
  RS.CO-03: 1  # "Information is shared with designated internal and external stakeholders as established in the incident response plan"
               # [PT] Partilha de informação com partes externas (CERT-PT, reguladores) limitada e informal

  # RS.MI — Incident Mitigation (2 subcategorias: RS.MI-01 a RS.MI-02)
  # Outcome: Activities are performed to prevent expansion of an event and mitigate its effects.
  RS.MI-01: 2  # "Incidents are contained"
               # [PT] Contenção de incidentes com procedimentos definidos; execução testada parcialmente
  RS.MI-02: 2  # "Incidents are eradicated"
               # [PT] Erradicação de incidentes com procedimentos definidos; sem automação de resposta (SOAR)

  # ===========================================================
  # RECOVER (RC) — 2 categorias, 8 subcategorias
  # "Restore assets and operations that were impacted by a cybersecurity incident"
  # ===========================================================

  # RC.RP — Incident Recovery Plan Execution (6 subcategorias: RC.RP-01 a RC.RP-06)
  # Outcome: The integrity of backups and other restoration assets is verified before
  #          using them for restoration, and restoration activities are performed to
  #          ensure that the organization returns to normal operations.
  RC.RP-01: 2  # "The recovery portion of the incident response plan is executed once initiated from the RESPOND function activities"
               # [PT] Plano de recuperação existe e é conhecido pela equipa; ativação não testada formalmente
  RC.RP-02: 2  # "Recovery actions are selected, scoped, prioritized, and performed"
               # [PT] Ações de recuperação priorizadas por impacto no negócio; sem RTO/RPO formais definidos
  RC.RP-03: 2  # "The integrity of backups and other restoration assets is verified before using them for restoration"
               # [PT] Integridade de backups verificada trimestralmente; restauro completo testado anualmente
  RC.RP-04: 1  # "Critical mission functions and cybersecurity risk management are considered to establish post-incident operational norms"
               # [PT] Missões críticas pós-incidente não totalmente consideradas; BCP básico em desenvolvimento
  RC.RP-05: 2  # "The integrity of restored assets is verified, systems and services are restored, and normal operating status is confirmed"
               # [PT] Integridade de ativos restaurados verificada; processo de validação sem checklist formal
  RC.RP-06: 1  # "The end of incident recovery is declared based on criteria, and the incident's documentation is completed"
               # [PT] Critérios de fim de recuperação não formalizados; encerramento de incidentes inconsistente

  # RC.CO — Incident Recovery Communication (2 subcategorias; RC.CO-01 e -02 não existem no CSF 2.0)
  # Outcome: Restoration activities are coordinated with internal and external parties.
  # NOTA: RC.CO-01 e RC.CO-02 não existem no CSF 2.0.
  RC.CO-03: 2  # "Recovery activities and progress in restoring operational capabilities are communicated to designated internal and external stakeholders as well as executive and management teams"
               # [PT] Comunicação de progresso da recuperação à liderança; sem templates formais de comunicação
  RC.CO-04: 1  # "Public updates on incident recovery are shared using approved methods and messaging"
               # [PT] Atualizações públicas não formalizadas; sem plano de comunicação de crise

